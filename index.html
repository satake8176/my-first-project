<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>佐竹幸信 | Profile</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark: #0d0f14;
      --bg-card: #141720;
      --accent: #c9a84c;
      --accent-soft: rgba(201, 168, 76, 0.15);
      --text-primary: #e8e4dc;
      --text-muted: #7a7f8e;
      --border: rgba(201, 168, 76, 0.2);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      line-height: 1.8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201, 168, 76, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(100, 120, 180, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 80px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 6px 18px;
      border-radius: 2px;
      margin-bottom: 32px;
    }

    .name-jp {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      font-size: clamp(2.8rem, 8vw, 5rem);
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #e8e4dc 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .name-en {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--text-muted);
      margin-top: 10px;
      letter-spacing: 0.1em;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 36px auto;
    }

    /* Cards */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 36px 32px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      border-color: rgba(201, 168, 76, 0.4);
      transform: translateY(-3px);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-full {
      grid-column: 1 / -1;
    }

    .card-icon {
      font-size: 1.8rem;
      margin-bottom: 14px;
      display: block;
    }

    .card-label {
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .card-value {
      font-size: 1.1rem;
      color: var(--text-primary);
      font-weight: 400;
    }

    /* About / Hobby section */
    .hobby-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
    }

    .hobby-section::after {
      content: '✈';
      position: absolute;
      right: 32px;
      bottom: 20px;
      font-size: 6rem;
      opacity: 0.04;
      pointer-events: none;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .hobby-text {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 2;
    }

    .hobby-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .tag {
      background: var(--accent-soft);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      padding: 6px 16px;
      border-radius: 2px;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 80px;
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
    }

    /* Responsive */
    @media (max-width: 560px) {
      .card-grid {
        grid-template-columns: 1fr;
      }
      .card-full {
        grid-column: 1;
      }
      .hobby-section {
        padding: 36px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <span class="eyebrow">Profile</span>
      <h1 class="name-jp">佐竹 幸信</h1>
      <p class="name-en">Yukinobu Satake</p>
      <div class="divider"></div>
    </header>

    <div class="card-grid">
      <div class="card">
        <span class="card-icon">👤</span>
        <p class="card-label">Name</p>
        <p class="card-value">佐竹 幸信</p>
      </div>

      <div class="card">
        <span class="card-icon">🎯</span>
        <p class="card-label">Hobby</p>
        <p class="card-value">旅行</p>
      </div>

      <div class="card card-full hobby-section">
        <h2 class="section-title">旅行について</h2>
        <p class="hobby-text">
          国内外を問わず、新しい場所を訪れることが大きな楽しみです。<br>
          その土地ならではの文化・食・景色に触れることで、日々の視野が広がります。<br>
          旅先での出会いや発見が、私の原動力のひとつになっています。
        </p>
        <div class="hobby-tags">
          <span class="tag">国内旅行</span>
          <span class="tag">海外旅行</span>
          <span class="tag">文化体験</span>
          <span class="tag">グルメ</span>
          <span class="tag">写真</span>
        </div>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Yukinobu Satake</p>
    </footer>

  </div>
</body>
</html>
